<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plane Crash Animation</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

.builing{
    height:300px;
    width:650px;
    background-image:url("https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTPxwEWVbM51aQWKpo5DPIpJd3OIs31usmf4Vq4gB6-bg&s=10");
    background-size:cover;
    background-repeat:no-repeat;
    background-position:center;
    position:relative;
    overflow:hidden;
}



.plane{
    width:100px;
    position:absolute;
    left:1000;
    top: 10px;
    animation:plane 3s ease-in forwards;
}

.plane img{
    width:100%;
}



.blast{
    width:150px;
    position:absolute;

   
    left:160px;
    top:155px;

    opacity:0;
    transform:scale(0);
}

.blast img{
    width:100%;
}

.blast.show{
    animation:blast .7s ease-out forwards;
}


@keyframes plane{

    from{
        left:0;
        top:10px;
        transform:scale(1);
    }

    to{
        left:180px;
        top:180px;
        transform:scale(.6);
    }

}


@keyframes blast{

    0%{
        opacity:1;
        transform:scale(0);
    }

    50%{
        opacity:1;
        transform:scale(5);
    }

    100%{
        opacity:0;
        transform:scale(7);
    }

}

</style>

</head>

<body>

<div class="builing">

    <div class="plane" id="plane">
        <img src="Airoplane.png" alt="">
    </div>

    <div class="blast" id="blast">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRaAwp-m_I06xCRpOISnMPH6I78m2s_ehadWSFAtLrV0A&s=10" alt="">
    </div>

</div>

<script>

const plane = document.getElementById("plane");
const blast = document.getElementById("blast");

plane.addEventListener("animationend",function(){

    plane.style.visibility="hidden";

    blast.classList.add("show");

    blast.addEventListener("animationend",function(){

        blast.classList.remove("show");

        setTimeout(function(){

            plane.style.visibility="visible";

            plane.style.animation="none";
            plane.offsetHeight;
            plane.style.animation="plane 3s ease-in forwards";

        },300);

    },{once:true});

});

</script>

</body>
</html>
