<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crazy Airplane Animation</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100%;
    height:100vh;
    overflow:hidden;
    background:linear-gradient(to bottom,#87CEEB,#ffffff);
    position:relative;
}

img{
    position:absolute;
    animation-timing-function:linear;
    animation-iteration-count:infinite;
}



.plane1{
    width:130px;
    animation:fly1 6s linear infinite;
}



.plane2{
    width:90px;
    animation:fly2 8s linear infinite;
    animation-delay:1s;
}



.plane3{
    width:70px;
    animation:fly3 7s linear infinite;
    animation-delay:2s;
}



.plane4{
    width:120px;
    animation:fly4 10s linear infinite;
    animation-delay:3s;
}



.plane5{
    width:80px;
    animation:fly5 5s linear infinite;
    animation-delay:1.5s;
}

.plane6{
    width:100px;
    animation:fly6 9s linear infinite;
    animation-delay:4s;
}



.plane7{
    width:60px;
    animation:fly7 6s linear infinite;
    animation-delay:2.5s;
}

.plane8{
    width:150px;
    animation:fly8 12s linear infinite;
    animation-delay:5s;
}


@keyframes fly1{
0%{left:-200px; top:80%; transform:rotate(-10deg);}
50%{transform:rotate(5deg);}
100%{left:110%; top:5%; transform:rotate(-8deg);}
}

@keyframes fly2{
0%{left:110%; top:15%; transform:scaleX(-1) rotate(8deg);}
100%{left:-200px; top:70%; transform:scaleX(-1) rotate(-8deg);}
}

@keyframes fly3{
0%{left:-150px; top:55%;}
25%{top:40%;}
50%{top:60%;}
75%{top:30%;}
100%{left:110%; top:10%;}
}

@keyframes fly4{
0%{left:-180px; top:20%;}
50%{transform:rotate(15deg);}
100%{left:110%; top:80%;}
}

@keyframes fly5{
0%{left:50%; top:-150px; transform:rotate(90deg);}
100%{left:70%; top:110%; transform:rotate(90deg);}
}

@keyframes fly6{
0%{left:20%; top:110%; transform:rotate(-90deg);}
100%{left:90%; top:-150px; transform:rotate(-70deg);}
}

@keyframes fly7{
0%{left:-100px; top:10%;}
50%{transform:translateY(40px);}
100%{left:110%; top:25%;}
}

@keyframes fly8{
0%{
left:-250px;
top:90%;
transform:scale(1.3);
}
25%{
transform:scale(1.1) rotate(-5deg);
}
50%{
transform:scale(0.9) rotate(8deg);
}
75%{
transform:scale(1.2);
}
100%{
left:110%;
top:0%;
transform:scale(1);
}
}

</style>

</head>

<body>

<img class="plane1" src="Airoplane.png" alt="">
<img class="plane2" src="Airoplane.png" alt="">
<img class="plane3" src="Airoplane.png" alt="">
<img class="plane4" src="Airoplane.png" alt="">
<img class="plane5" src="Airoplane.png" alt="">
<img class="plane6" src="Airoplane.png" alt="">
<img class="plane7" src="Airoplane.png" alt="">
<img class="plane8" src="Airoplane.png" alt="">

</body>
</html>
